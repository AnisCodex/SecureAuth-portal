<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SecureAuth Portal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a12;
            --border:    rgba(255,255,255,0.10);
            --accent:    #6c63ff;
            --accent2:   #ff6584;
            --text:      #e8e8f0;
            --muted:     #7a7a9a;
        }

        html, body {
            height: 100%;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .blob-1 { width: 600px; height: 600px; background: #6c63ff; top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: #ff6584; bottom: -150px; right: -150px; animation-delay: -6s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.05); }
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-icon {
            width: 64px; height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 24px rgba(108,99,255,0.35);
        }

        h1 {
            font-family: Arial, sans-serif;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p.subtitle {
            margin-bottom: 36px;
            font-size: 16px;
            color: var(--muted);
        }

        .btn-row {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 15px;
            display: inline-block;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(108,99,255,0.35);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,99,255,0.45); }

        .register-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .register-btn:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">
    <div>
        <div class="brand-icon">🔐</div>
        <h1>SecureAuth Portal</h1>
        <p class="subtitle">Simple Login &amp; Registration System</p>

        <div class="btn-row">
            <a href="/loginPage" class="btn login-btn">Login</a>
            <a href="/registerPage" class="btn register-btn">Register</a>
        </div>
    </div>
</div>

</body>
</html>
