spring.application.name=SecureAuthPortal


server.port=8080


spring.datasource.url= jdbc:postgresql://localhost:5432/reg_login_db
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false

# JWT config
# 30 minutes, in milliseconds
jwt.expiration-ms=1800000
# This MUST be a long, random, secret string in production -- move it to an
# environment variable before deploying. Never commit a real secret to Git.
jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast256BitsForHS256SigningAlgorithm