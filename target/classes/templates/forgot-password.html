<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — SecureAuth Portal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a12;
            --border:    rgba(255,255,255,0.10);
            --accent:    #6c63ff;
            --accent2:   #ff6584;
            --text:      #e8e8f0;
            --muted:     #7a7a9a;
            --success:   #43e97b;
        }

        html, body {
            height: 100%;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px;
        }

        h1 {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .sub {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            margin-bottom: 22px;
            background: rgba(67,233,123,0.10);
            border: 1px solid rgba(67,233,123,0.25);
            color: var(--success);
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: Arial, sans-serif;
            font-size: 15px;
            outline: none;
            margin-bottom: 20px;
        }
        input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }
        .footer-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<div class="page">
    <div class="card">
        <h1>Forgot your password?</h1>
        <p class="sub">Enter the email you registered with and we'll send you a link to reset your password.</p>

        <div class="alert" th:if="${infoMsg != null}" th:text="${infoMsg}"></div>

        <form action="/forgotPassword" method="post">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required/>
            <button type="submit" class="btn-primary">Send reset link</button>
        </form>

        <div class="footer-link">
            <a href="/loginPage">Back to login</a>
        </div>
    </div>
</div>

</body>
</html>
