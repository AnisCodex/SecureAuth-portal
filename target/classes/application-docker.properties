# This file is only used when the app runs INSIDE Docker (activated via
# the SPRING_PROFILES_ACTIVE=docker environment variable set in
# docker-compose.yml). It overrides just the settings that need to differ
# between "running on my Windows machine" and "running in a container."
#
# Everything not overridden here still comes from application.properties.

# "db" is not a real hostname -- it's the service name we'll define in
# docker-compose.yml. Docker automatically makes containers reachable by
# their service name, the same way "localhost" works on a normal machine.
spring.datasource.url=jdbc:postgresql://db:5432/reg_login_db
spring.datasource.username=postgres
spring.datasource.password=123
